{% extends "base.html" %}
{% set hide_nav = True %}
{% block title %}登录 — 几何星球{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-glass liquid-glass-strong text-center">

    <!-- 品牌标识 -->
    <div class="mb-6">
      <div class="liquid-glass w-20 h-20 mx-auto flex items-center justify-center rounded-2xl mb-4"
           style="font-family:'Instrument Serif',serif; font-size:36px; font-style:italic; color:#fff;">
        ✦
      </div>
    </div>

    <!-- 标题 -->
    <h1 class="text-5xl md:text-6xl lg:text-7xl text-white mb-8"
        id="authTitle"
        style="font-family: 'Instrument Serif', 'Noto Serif SC', 'STSong', 'Songti SC', serif; font-weight: 400; letter-spacing: 0.1em; line-height: 1.1;">
      几何星球
    </h1>

    <!-- 表单 -->
    <form class="text-left max-w-sm mx-auto" id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-4">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">用户名</label>
        <input type="text" class="input-glass" id="username" placeholder="请输入用户名" autocomplete="username" required />
      </div>
      <div class="mb-6">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">密码</label>
        <input type="password" class="input-glass" id="password" placeholder="请输入密码" autocomplete="current-password" required />
      </div>
      <button type="submit" class="liquid-glass-strong w-full py-3 rounded-full text-sm font-medium text-white font-body flex items-center justify-center gap-2" id="loginBtn">
        登 录
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
      </button>
    </form>

    <p class="mt-6 text-sm text-white/40 font-body">
      还没有账号？<a href="/register" class="text-white/70 hover:text-white underline underline-offset-4">立即注册</a>
    </p>

  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  (function() {
    var el = document.getElementById('authTitle');
    if (!el) return;
    var text = el.textContent.trim();
    var chars = text.split('');
    el.innerHTML = '';
    el.style.display = 'flex';
    el.style.flexWrap = 'wrap';
    el.style.justifyContent = 'center';
    el.style.rowGap = '0.1em';
    chars.forEach(function(c, i) {
      var span = document.createElement('span');
      span.textContent = c;
      span.style.display = 'inline-block';
      if (window.Motion) {
        window.Motion.animate(
          span,
          { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] },
          { duration: 0.7, delay: i * 0.08, ease: 'easeOut' }
        );
      } else {
        span.style.animation = 'fade-rise 0.7s ease-out both';
        span.style.animationDelay = (i * 0.08) + 's';
      }
      el.appendChild(span);
    });
  })();

  function handleLogin(e) {
    e.preventDefault();
    var btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 登录中...';
    fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.success) {
          window.location.href = "/";
        } else {
          showToast(res.error || "登录失败", "error");
          btn.disabled = false;
          btn.innerHTML = '登 录 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';
        }
      })
      .catch(function () {
        showToast("网络错误", "error");
        btn.disabled = false;
        btn.innerHTML = '登 录 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';
      });
  }
</script>
{% endblock %}
