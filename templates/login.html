{% extends "base.html" %}
{% set hide_nav = True %}
{% block title %}登录 — 几何星球{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-glass liquid-glass-strong text-center">

    <!-- Badge -->
    <div class="liquid-glass inline-flex items-center rounded-full mb-6">
      <span class="bg-white text-black px-3 py-1 text-xs font-semibold rounded-full">全新</span>
      <span class="text-sm text-white/90 pr-3">2026 首发载人火星之旅即将启程</span>
    </div>

    <!-- 标题 -->
    <h1 class="text-4xl md:text-5xl lg:text-5xl font-heading italic text-white leading-[0.9] tracking-[-2px] mb-6"
        id="authTitle">
      超越天际<br/>探索宇宙
    </h1>

    <!-- 副标题 -->
    <p class="text-sm md:text-base text-white/85 max-w-md mx-auto font-body font-light leading-relaxed mb-8">
      以前所未有的方式发现宇宙。我们开创性的飞船与突破性工程技术，让深空探索触手可及——安全而卓越。
    </p>

    <!-- 表单 -->
    <form class="text-left max-w-sm mx-auto" id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-4">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">用户名</label>
        <input type="text" class="input-glass" id="username" placeholder="请输入用户名" autocomplete="username" required />
      </div>
      <div class="mb-6">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">密码</label>
        <input type="password" class="input-glass" id="password" placeholder="请输入密码" autocomplete="current-password" required />
      </div>
      <button type="submit" class="liquid-glass-strong w-full py-3 rounded-full text-sm font-medium text-white font-body flex items-center justify-center gap-2" id="loginBtn">
        开始探索
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
      </button>
    </form>

    <p class="mt-6 text-sm text-white/40 font-body">
      还没有账号？<a href="/register" class="text-white/70 hover:text-white underline underline-offset-4">立即注册</a>
    </p>

    <!-- 合作伙伴 -->
    <div class="mt-10 flex flex-col items-center gap-4">
      <div class="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white/70">
        与全球顶尖航天先驱携手合作
      </div>
      <div class="flex gap-8 md:gap-12 text-lg md:text-xl font-heading italic text-white/60">
        <span>永航</span><span>·</span><span>星辰</span><span>·</span><span>天工</span><span>·</span><span>轨道</span><span>·</span><span>致远</span>
      </div>
    </div>

  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  // ── BlurText 逐词模糊动画 ──
  (function() {
    var el = document.getElementById('authTitle');
    if (!el) return;
    var text = el.textContent.trim().replace(/\s+/g, ' ');
    var words = text.split(' ');
    el.innerHTML = '';
    el.style.display = 'flex';
    el.style.flexWrap = 'wrap';
    el.style.justifyContent = 'center';
    el.style.rowGap = '0.1em';
    words.forEach(function(w, i) {
      var span = document.createElement('span');
      span.textContent = w;
      span.style.display = 'inline-block';
      span.style.marginRight = '0.28em';
      if (window.Motion) {
        window.Motion.animate(
          span,
          { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] },
          { duration: 0.7, delay: i * 0.1, ease: 'easeOut' }
        );
      } else {
        span.style.animation = 'fade-rise 0.7s ease-out both';
        span.style.animationDelay = (i * 0.1) + 's';
      }
      el.appendChild(span);
    });
  })();

  function handleLogin(e) {
    e.preventDefault();
    var btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 登录中...';
    fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.success) {
          window.location.href = "/";
        } else {
          showToast(res.error || "登录失败", "error");
          btn.disabled = false;
          btn.innerHTML = '开始探索 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';
        }
      })
      .catch(function () {
        showToast("网络错误", "error");
        btn.disabled = false;
        btn.innerHTML = '开始探索 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';
      });
  }
</script>
{% endblock %}
