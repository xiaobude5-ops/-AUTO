{% extends "base.html" %}
{% set hide_nav = True %}
{% block title %}注册 — 几何星球{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-glass liquid-glass-strong text-center">

    <h1 class="text-5xl md:text-6xl lg:text-7xl font-heading italic text-white leading-[0.95] tracking-[-2px] mb-8"
        id="authTitle">
      立即注册
    </h1>

    <form class="text-left max-w-sm mx-auto" id="registerForm" onsubmit="handleRegister(event)">
      <div class="mb-4">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">用户名</label>
        <input type="text" class="input-glass" id="username" placeholder="至少2个字符" autocomplete="off" required />
      </div>
      <div class="mb-4">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">昵称</label>
        <input type="text" class="input-glass" id="nickname" placeholder="你的姓名" autocomplete="off" required />
      </div>
      <div class="mb-4">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">密码</label>
        <input type="password" class="input-glass" id="password" placeholder="至少4位" autocomplete="new-password" required />
      </div>
      <div class="mb-6">
        <label class="block text-xs font-medium text-white/60 mb-1.5 font-body uppercase tracking-wider">确认密码</label>
        <input type="password" class="input-glass" id="password2" placeholder="再次输入密码" autocomplete="new-password" required />
      </div>
      <button type="submit" class="liquid-glass-strong w-full py-3 rounded-full text-sm font-medium text-white font-body flex items-center justify-center gap-2" id="regBtn">
        注 册
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
      </button>
    </form>

    <p class="mt-6 text-sm text-white/40 font-body">
      已有账号？<a href="/login" class="text-white/70 hover:text-white underline underline-offset-4">返回登录</a>
    </p>

  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  (function() {
    var el = document.getElementById('authTitle');
    if (!el) return;
    var text = el.textContent.trim();
    var chars = text.split('');
    el.innerHTML = '';
    el.style.display = 'flex';
    el.style.flexWrap = 'wrap';
    el.style.justifyContent = 'center';
    el.style.rowGap = '0.1em';
    chars.forEach(function(c, i) {
      var span = document.createElement('span');
      span.textContent = c;
      span.style.display = 'inline-block';
      if (window.Motion) {
        window.Motion.animate(
          span,
          { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] },
          { duration: 0.7, delay: i * 0.08, ease: 'easeOut' }
        );
      } else {
        span.style.animation = 'fade-rise 0.7s ease-out both';
        span.style.animationDelay = (i * 0.08) + 's';
      }
      el.appendChild(span);
    });
  })();

  function handleRegister(e) {
    e.preventDefault();
    var pwd = document.getElementById("password").value;
    var pwd2 = document.getElementById("password2").value;
    if (pwd !== pwd2) {
      showToast("两次密码不一致", "error");
      return;
    }
    var btn = document.getElementById("regBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 注册中...';
    fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value.trim(),
        nickname: document.getElementById("nickname").value.trim(),
        password: pwd,
      }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.success) {
          showToast("注册成功，请登录", "success");
          setTimeout(function () { window.location.href = "/login"; }, 1000);
        } else {
          showToast(res.error || "注册失败", "error");
          btn.disabled = false;
          btn.innerHTML = '注 册 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';
        }
      })
      .catch(function () {
        showToast("网络错误", "error");
        btn.disabled = false;
        btn.innerHTML = '注 册 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';
      });
  }
</script>
{% endblock %}
